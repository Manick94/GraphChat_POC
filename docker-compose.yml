version: '3.9'
services:
  api:
    image: node:20
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm install && npm run dev --workspace @conversation-trainer/api"
    ports:
      - '4000:4000'

  web:
    image: node:20
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm install && npm run dev --workspace @conversation-trainer/web -- --host 0.0.0.0"
    ports:
      - '5173:5173'
    depends_on:
      - api
